services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: restaurantos
      POSTGRES_USER: restaurantos
      POSTGRES_PASSWORD: restaurantos_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Port NOT exposed to the host — DB is only accessible within the Docker network.
    # Remove the ports mapping to prevent external connections to PostgreSQL.
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U restaurantos"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://restaurantos:restaurantos_secret@db:5432/restaurantos
      SECRET_KEY: ${SECRET_KEY:-change-this-in-production-to-a-random-string}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 480
      CORS_ORIGINS: http://localhost:3000,http://frontend:3000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python seed.py && uvicorn main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: .
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000

volumes:
  postgres_data:
